spring:
  application:
    name: rbac-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:rbac;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:ReplaceThisWithAtLeast32CharsSecretKey12345}
    access-token-expire-seconds: ${JWT_ACCESS_EXPIRE:3600}
    refresh-token-expire-seconds: ${JWT_REFRESH_EXPIRE:604800}

app:
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
    admin-username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@123456}
